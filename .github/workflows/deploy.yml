name: Deploy to Google Cloud Run

on:
  push:
    branches:
      - main
      - dev

env:
  PROJECT_ID: clteccct-poc-0map
  REGION: europe-southwest1
  REPO_NAME: webexccconfig-mcp

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write" # Required for Workload Identity Federation

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set environment specific variables
        run: |
          if [[ "${{ github.ref }}" == "refs/heads/main" ]]; then
            echo "SERVICE_NAME=${REPO_NAME}-stable" >> $GITHUB_ENV
            echo "ENV_NAME=stable" >> $GITHUB_ENV
          elif [[ "${{ github.ref }}" == "refs/heads/dev" ]]; then
            echo "SERVICE_NAME=${REPO_NAME}-dev" >> $GITHUB_ENV
            echo "ENV_NAME=dev" >> $GITHUB_ENV
          fi

      # Setup GCP authentication
      - id: "auth"
        name: "Authenticate to Google Cloud"
        uses: "google-github-actions/auth@v2"
        with:
          # This assumes you set up Workload Identity Federation
          # workload_identity_provider: "projects/1234567890/locations/global/workloadIdentityPools/github/providers/my-repo"
          # service_account: "my-service-account@${{ env.PROJECT_ID }}.iam.gserviceaccount.com"
          # Alternatively, use a secret named GCP_CREDENTIALS containing the Service Account JSON key
          credentials_json: '${{ secrets.GCP_CREDENTIALS }}'

      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v2"

      - name: "Docker auth"
        run: |-
          gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev

      - name: "Build and Push Container"
        run: |-
          DOCKER_TAG="${{ env.REGION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/cloud-run-source-deploy/${{ env.SERVICE_NAME }}:${{ github.sha }}"
          docker build -t "${DOCKER_TAG}" .
          docker push "${DOCKER_TAG}"
          echo "IMAGE=${DOCKER_TAG}" >> $GITHUB_ENV

      - name: "Deploy to Cloud Run"
        uses: "google-github-actions/deploy-cloudrun@v2"
        with:
          service: "${{ env.SERVICE_NAME }}"
          region: "${{ env.REGION }}"
          image: "${{ env.IMAGE }}"
          labels: |
            intended_public=true
          # We don't hardcode sensitive WEBEX_TOKEN or WEBEX_ORG_ID here.
          # They should be configured manually in the Cloud Run console 
          # or via Secret Manager references in this step.
